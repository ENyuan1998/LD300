<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老得服務訂單系統</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft JhengHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .form-container {
      padding: 40px;
    }
    
    .service-selector {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .service-card {
      flex: 1;
      padding: 20px;
      border: 3px solid #e0e0e0;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    
    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .service-card.active {
      border-color: #667eea;
      background: #f0f4ff;
    }
    
    .service-card h3 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #333;
    }
    
    .service-card p {
      font-size: 14px;
      color: #666;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
      font-size: 15px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .price-summary {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      margin: 30px 0;
    }
    
    .price-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .price-item:last-child {
      border-bottom: none;
      font-size: 20px;
      font-weight: bold;
      color: #667eea;
      padding-top: 15px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
    }
    
    .modal-content h2 {
      color: #667eea;
      margin-bottom: 20px;
    }
    
    .modal-content p {
      margin-bottom: 15px;
      color: #666;
    }
    
    .modal-btn {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    
    @media (max-width: 768px) {
      .service-selector {
        flex-direction: column;
      }
      
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .form-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 老得服務訂單系統</h1>
      <p>專業搬家 · 寵物接送 · 值得信賴</p>
    </div>
    
    <div class="form-container">
      <form id="orderForm">
        <!-- 服務選擇 -->
        <div class="service-selector">
          <div class="service-card" data-service="搬家服務">
            <h3>🏠 自助搬家</h3>
            <p>得利卡4x4高頂車款<br>基礎出車費 NT$500</p>
          </div>
          <div class="service-card" data-service="寵物接送">
            <h3>🐾 寵物接送</h3>
            <p>專業毛孩接送服務<br>基礎出車費 NT$350</p>
          </div>
        </div>
        
        <!-- 訂購者資料 -->
        <div class="form-row">
          <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label>聯絡電話 *</label>
            <input type="tel" id="phone" name="phone" required>
          </div>
        </div>
        
        <!-- 預約日期時間 -->
        <div class="form-row">
          <div class="form-group">
            <label>預約日期 *</label>
            <input type="date" id="bookingDate" name="bookingDate" required>
          </div>
          <div class="form-group">
            <label>預約時間 *</label>
            <input type="time" id="bookingTime" name="bookingTime" required>
          </div>
        </div>
        
        <!-- 地點資訊 -->
        <div class="form-group">
          <label>起點地址 *</label>
          <input type="text" id="startAddress" name="startAddress" placeholder="請輸入完整地址" required>
        </div>
        
        <div class="form-group">
          <label>終點地址 *</label>
          <input type="text" id="endAddress" name="endAddress" placeholder="請輸入完整地址" required>
        </div>
        
        <!-- 需求內容 -->
        <div class="form-group">
          <label>需求內容</label>
          <textarea id="requirements" name="requirements" placeholder="請描述您的特殊需求，例如：大型犬、多寵共乘、樓層資訊等"></textarea>
        </div>
        
        <!-- 費用預估 -->
        <div class="price-summary">
          <div class="price-item">
            <span>基礎出車費</span>
            <span id="baseFee">NT$ 0</span>
          </div>
          <div class="price-item">
            <span>超程費用（預估）</span>
            <span id="extraFee">NT$ 0</span>
          </div>
          <div class="price-item">
            <span>總計金額</span>
            <span id="totalAmount">NT$ 0</span>
          </div>
        </div>
        
        <button type="submit" class="submit-btn">確認送出訂單</button>
      </form>
    </div>
  </div>
  
  <!-- 成功提示視窗 -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <h2>✅ 訂單送出成功！</h2>
      <p>訂單編號：<strong id="orderNumber"></strong></p>
      <p>我們已收到您的預約，將盡快與您聯繫確認。</p>
      <button class="modal-btn" onclick="location.reload()">返回首頁</button>
    </div>
  </div>
  
  <script>
    // 替換成您的 Google Apps Script Web App URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyID57YXKqLpAidLvLbfSpiyiURt_zdw8cW1mpbVESVw7CiCpB6bDyns6m1B5cJHSpG/exec';
    
    let selectedService = '';
    let baseFee = 0;
    
    // 服務選擇
    document.querySelectorAll('.service-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        selectedService = this.dataset.service;
        
        if (selectedService === '搬家服務') {
          baseFee = 500;
        } else if (selectedService === '寵物接送') {
          baseFee = 350;
        }
        
        updatePrice();
      });
    });
    
    // 更新價格
    function updatePrice() {
      document.getElementById('baseFee').textContent = `NT$ ${baseFee}`;
      document.getElementById('totalAmount').textContent = `NT$ ${baseFee}`;
    }
    
    // 設定最小日期為今天
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('bookingDate').setAttribute('min', today);
    
    // 表單提交
    document.getElementById('orderForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!selectedService) {
        alert('請選擇服務類型');
        return;
      }
      
      const formData = {
        serviceType: selectedService,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        bookingDate: document.getElementById('bookingDate').value,
        bookingTime: document.getElementById('bookingTime').value,
        startAddress: document.getElementById('startAddress').value,
        endAddress: document.getElementById('endAddress').value,
        requirements: document.getElementById('requirements').value,
        totalAmount: baseFee
      };
      
      // 停用按鈕
      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = '處理中...';
      
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('orderNumber').textContent = result.orderNumber;
          document.getElementById('successModal').classList.add('show');
        } else {
          alert('訂單送出失敗：' + result.message);
          submitBtn.disabled = false;
          submitBtn.textContent = '確認送出訂單';
        }
      } catch (error) {
        alert('系統錯誤，請稍後再試');
        submitBtn.disabled = false;
        submitBtn.textContent = '確認送出訂單';
      }
    });
  </script>
</body>
</html>
