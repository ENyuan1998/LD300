<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老得服務 - 搬家 & 寵物接送預約系統</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif;
      background: linear-gradient(135deg, #FFF8F0 0%, #F5E6D3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(139, 90, 43, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #D2691E 0%, #8B4513 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
    }

    .tabs {
      display: flex;
      background: #F5E6D3;
      border-bottom: 3px solid #D2691E;
    }

    .tab {
      flex: 1;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      color: #8B4513;
      transition: all 0.3s;
      border: none;
      background: transparent;
    }

    .tab:hover {
      background: rgba(210, 105, 30, 0.1);
    }

    .tab.active {
      background: white;
      color: #D2691E;
      border-bottom: 3px solid #D2691E;
      margin-bottom: -3px;
    }

    .tab-content {
      display: none;
      padding: 40px 30px;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #8B4513;
      font-size: 16px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #E8D5C4;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #D2691E;
      box-shadow: 0 0 0 3px rgba(210, 105, 30, 0.1);
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 2px solid #E8D5C4;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      background: #FFFAF5;
    }

    .checkbox-item:hover {
      border-color: #D2691E;
      background: #FFF8F0;
    }

    .checkbox-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: #D2691E;
    }

    .checkbox-item.checked {
      border-color: #D2691E;
      background: linear-gradient(135deg, #FFF8F0 0%, #FFE4CC 100%);
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .quantity-btn {
      width: 30px;
      height: 30px;
      border: 2px solid #D2691E;
      background: white;
      color: #D2691E;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .quantity-btn:hover {
      background: #D2691E;
      color: white;
    }

    .quantity-display {
      font-weight: bold;
      color: #D2691E;
      min-width: 30px;
      text-align: center;
    }

    .time-slots-section {
      margin-top: 20px;
      padding: 20px;
      background: #FFF8F0;
      border-radius: 10px;
      border: 2px solid #E8D5C4;
    }

    .time-slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .time-slot {
      padding: 12px;
      text-align: center;
      border: 2px solid #E8D5C4;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
      font-weight: bold;
      color: #8B4513;
    }

    .time-slot:hover:not(.disabled) {
      border-color: #D2691E;
      background: #FFF8F0;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(210, 105, 30, 0.2);
    }

    .time-slot.selected {
      background: linear-gradient(135deg, #D2691E 0%, #8B4513 100%);
      color: white;
      border-color: #8B4513;
    }

    .time-slot.disabled {
      background: #F0F0F0;
      color: #999;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .summary-box {
      background: linear-gradient(135deg, #FFF8F0 0%, #F5E6D3 100%);
      padding: 25px;
      border-radius: 15px;
      margin: 30px 0;
      border: 3px solid #D2691E;
    }

    .summary-box h3 {
      color: #8B4513;
      margin-bottom: 20px;
      font-size: 22px;
      text-align: center;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #E8D5C4;
      color: #8B4513;
    }

    .summary-item:last-child {
      border-bottom: none;
      font-size: 20px;
      font-weight: bold;
      color: #D2691E;
      padding-top: 15px;
      margin-top: 10px;
      border-top: 2px solid #D2691E;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #D2691E 0%, #8B4513 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(210, 105, 30, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(210, 105, 30, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      box-shadow: none;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      animation: fadeIn 0.3s;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-content h2 {
      color: #D2691E;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .modal-content p {
      color: #8B4513;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .success-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #A0826D;
    }

    .loading-spinner {
      border: 4px solid #E8D5C4;
      border-top: 4px solid #D2691E;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ✨ 新增：提交訂單的載入畫面 */
    .submit-loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .submit-loading-overlay.show {
      display: flex;
    }

    .submit-loading-content {
      background: white;
      padding: 50px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s;
    }

    .submit-loading-spinner {
      border: 6px solid #E8D5C4;
      border-top: 6px solid #D2691E;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    .submit-loading-content h3 {
      color: #D2691E;
      font-size: 24px;
      margin-bottom: 15px;
    }

    .submit-loading-content p {
      color: #8B4513;
      font-size: 16px;
      line-height: 1.6;
    }

    .info-box {
      background: #E8F4FD;
      border-left: 4px solid #2196F3;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      color: #1565C0;
    }

    .warning-box {
      background: #FFF3E0;
      border-left: 4px solid #FF9800;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      color: #E65100;
    }

    .contact-info {
      text-align: center;
      padding: 30px;
      background: #FFF8F0;
      border-radius: 15px;
      margin-top: 20px;
      position: relative;
    }

    .contact-info h3 {
      color: #8B4513;
      margin-bottom: 15px;
    }

    .contact-info p {
      color: #A0826D;
      margin: 8px 0;
      font-size: 16px;
    }

    .contact-info a {
      color: #D2691E;
      text-decoration: none;
      font-weight: bold;
    }

    .contact-note {
      background: #FFE4CC;
      border: 2px solid #FF9800;
      padding: 12px 15px;
      border-radius: 8px;
      margin-top: 15px;
      color: #E65100;
      font-weight: bold;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .container {
        border-radius: 0;
      }

      .header h1 {
        font-size: 24px;
      }

      .tab {
        font-size: 14px;
        padding: 15px 10px;
      }

      .tab-content {
        padding: 20px 15px;
      }

      .checkbox-group {
        grid-template-columns: 1fr;
      }

      .time-slots-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }

      .submit-loading-content {
        padding: 40px 30px;
      }

      .submit-loading-spinner {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 老得服務預約系統</h1>
      <p>專業搬家 & 寵物接送服務 | 值得信賴的好夥伴</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('moving')">🏠 搬家服務</button>
      <button class="tab" onclick="showTab('pet')">🐾 寵物接送</button>
    </div>

    <!-- 搬家服務 -->
    <div id="moving" class="tab-content active">
      <form id="movingForm">
        <div class="form-group">
          <label>👤 您的姓名 *</label>
          <input type="text" name="name" required placeholder="請輸入您的姓名">
        </div>

        <div class="form-group">
          <label>📱 聯絡電話 *</label>
          <input type="tel" name="phone" required placeholder="例如：0912345678">
        </div>

        <div class="form-group">
          <label>📅 預約日期 *</label>
          <input type="date" name="bookingDate" id="movingDate" required onchange="loadAvailableTimeSlots('moving')">
        </div>

        <div id="movingTimeSlotsSection" class="time-slots-section" style="display: none;">
          <label><strong>⏰ 選擇時段 *</strong></label>
          <div id="movingTimeSlotsGrid" class="time-slots-grid"></div>
        </div>

        <div class="form-group">
          <label>🗺️ 起始地區 *</label>
          <select name="startRegion" id="movingStartRegion" required onchange="updateMovingSummary()">
            <option value="">請選擇起始地區</option>
            <option value="台中市區" data-fee="0">台中市區（起始費用 NT$ 0）</option>
            <option value="台中郊區" data-fee="150">台中郊區（起始費用 NT$ 150）</option>
            <option value="彰化地區" data-fee="300">彰化地區（起始費用 NT$ 300）</option>
            <option value="南投地區" data-fee="500">南投地區（起始費用 NT$ 500）</option>
          </select>
        </div>

        <div class="form-group">
          <label>📍 起點地址 *</label>
          <input type="text" name="startAddress" required placeholder="請輸入搬家起點地址">
        </div>

        <div class="form-group">
          <label>📍 終點地址 *</label>
          <input type="text" name="endAddress" required placeholder="請輸入搬家終點地址">
        </div>

        <div class="form-group">
          <label>📏 預估距離（公里）*</label>
          <input type="number" name="distance" id="movingDistance" min="0" step="0.1" required placeholder="請輸入預估距離" onchange="updateMovingSummary()">
          <small style="color: #A0826D; display: block; margin-top: 5px;">💡 基礎費用已含5公里內，超過5公里每公里加收25元</small>
        </div>

        <div class="form-group">
          <label>🏢 樓層類型 *</label>
          <select name="floorType" id="movingFloorType" required onchange="updateMovingFloorOptions()">
            <option value="">請選擇</option>
            <option value="無須協助搬運">無須協助搬運（不收費用）</option>
            <option value="電梯">電梯</option>
            <option value="樓梯">樓梯</option>
          </select>
        </div>

        <div class="form-group" id="movingFloorCountGroup" style="display: none;">
          <label>🔢 樓層數 *</label>
          <input type="number" name="floorCount" id="movingFloorCount" min="1" placeholder="請輸入樓層數" onchange="updateMovingSummary()">
        </div>

        <div class="form-group">
          <label>📝 其他需求</label>
          <textarea name="requirements" rows="4" placeholder="請說明其他特殊需求或注意事項"></textarea>
        </div>

        <div class="summary-box">
          <h3>💰 費用總計</h3>
          <div id="movingSummary"></div>
        </div>

        <button type="submit" class="btn">確認預約</button>
      </form>

      <div class="contact-info">
        <h3>📞 聯絡我們</h3>
        <p>LINE ID: <a href="https://line.me/ti/p/0922317535" target="_blank">0922317535</a></p>
        <p>電話: <a href="tel:0922317535">0922-317-535</a></p>
        <div class="contact-note">
          ⚠️ 完成預約後請與我們聯繫
        </div>
      </div>
    </div>

    <!-- 寵物接送 -->
    <div id="pet" class="tab-content">
      <form id="petForm">
        <div class="form-group">
          <label>👤 您的姓名 *</label>
          <input type="text" name="name" required placeholder="請輸入您的姓名">
        </div>

        <div class="form-group">
          <label>📱 聯絡電話 *</label>
          <input type="tel" name="phone" required placeholder="例如：0912345678">
        </div>

        <div class="form-group">
          <label>📅 預約日期 *</label>
          <input type="date" name="bookingDate" id="petDate" required onchange="loadAvailableTimeSlots('pet')">
        </div>

        <div id="petTimeSlotsSection" class="time-slots-section" style="display: none;">
          <label><strong>⏰ 選擇時段 *</strong></label>
          <div id="petTimeSlotsGrid" class="time-slots-grid"></div>
        </div>

        <div class="form-group">
          <label>🗺️ 起始地區 *</label>
          <select name="startRegion" id="petStartRegion" required onchange="updatePetSummary()">
            <option value="">請選擇起始地區</option>
            <option value="台中市區" data-fee="0">台中市區（起始費用 NT$ 0）</option>
            <option value="台中郊區" data-fee="150">台中郊區（起始費用 NT$ 150）</option>
            <option value="彰化地區" data-fee="300">彰化地區（起始費用 NT$ 300）</option>
            <option value="南投地區" data-fee="500">南投地區（起始費用 NT$ 500）</option>
          </select>
        </div>

        <div class="form-group">
          <label>📍 接送起點 *</label>
          <input type="text" name="startAddress" required placeholder="請輸入寵物接送起點">
        </div>

        <div class="form-group">
          <label>📍 接送終點 *</label>
          <input type="text" name="endAddress" required placeholder="請輸入寵物接送終點">
        </div>

        <div class="form-group">
          <label>📏 預估距離（公里）*</label>
          <input type="number" name="distance" id="petDistance" min="0" step="0.1" required placeholder="請輸入預估距離" onchange="updatePetSummary()">
          <small style="color: #A0826D; display: block; margin-top: 5px;">💡 基礎費用已含5公里內，超過5公里每公里加收25元</small>
        </div>

        <div class="form-group">
          <label>👥 飼主陪同</label>
          <select name="ownerAccompany" id="petOwnerAccompany" onchange="updatePetSummary()">
            <option value="no">不需要</option>
            <option value="yes">需要陪同（+150元）</option>
          </select>
        </div>

        <div class="form-group">
          <label>📝 寵物資訊 & 其他需求</label>
          <textarea name="requirements" rows="4" placeholder="請說明寵物種類、大小、特殊需求等"></textarea>
        </div>

        <div class="summary-box">
          <h3>💰 費用總計</h3>
          <div id="petSummary"></div>
        </div>

        <button type="submit" class="btn">確認預約</button>
      </form>

      <div class="contact-info">
        <h3>📞 聯絡我們</h3>
        <p>LINE ID: <a href="https://line.me/ti/p/0922317535" target="_blank">0922317535</a></p>
        <p>電話: <a href="tel:0922317535">0922-317-535</a></p>
        <div class="contact-note">
          ⚠️ 完成預約後請與我們聯繫
        </div>
      </div>
    </div>
  </div>

  <!-- ✨ 新增：提交訂單的載入畫面 -->
  <div class="submit-loading-overlay" id="submitLoadingOverlay">
    <div class="submit-loading-content">
      <div class="submit-loading-spinner"></div>
      <h3>正在提交訂單...</h3>
      <p>請稍候，不要關閉頁面<br>系統正在處理您的預約</p>
    </div>
  </div>

  <!-- 成功彈窗 -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <div class="success-icon">✅</div>
      <h2>預約成功！</h2>
      <p id="successMessage"></p>
      <button class="btn" onclick="closeModal()">確定</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyID57YXKqLpAidLvLbfSpiyiURt_zdw8cW1mpbVESVw7CiCpB6bDyns6m1B5cJHSpG/exec';
    
    // 更新後的費用設定
    const PRICING = {
      moving: {
        baseFee: 500,              // 基本出車費（含5公里內）
        baseDistance: 5,           // 基本里程（公里）
        extraDistanceFee: 25,      // 超程累加費（每公里）
        elevatorFee: 300,          // 電梯樓層費
        stairsFeePerFloor: 100,    // 走樓梯樓層費（每層）
        nightSurcharge: 300        // 夜間出勤加給（22:00 - 06:00）
      },
      pet: {
        baseFee: 350,              // 基礎出車費（含基本里程5公里內）
        baseDistance: 5,           // 基本里程（公里）
        extraDistanceFee: 25,      // 超程累加費（每公里）
        nightSurcharge: 300,       // 夜間/清晨出勤加給（22:00 - 06:00）
        ownerAccompanyFee: 150     // 飼主陪同費用
      }
    };
    
    let selectedMovingTimeSlot = null;
    let selectedPetTimeSlot = null;
    
    // 服務項目數據結構
    let movingServicesData = {};
    let petServicesData = {};

    // ✨ 新增：顯示/隱藏提交載入畫面
    function showSubmitLoading() {
      document.getElementById('submitLoadingOverlay').classList.add('show');
    }

    function hideSubmitLoading() {
      document.getElementById('submitLoadingOverlay').classList.remove('show');
    }

    // 切換分頁
    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });
      
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
      
      // 重置選擇的時段
      if (tabName === 'moving') {
        selectedMovingTimeSlot = null;
      } else {
        selectedPetTimeSlot = null;
      }
    }

    // 獲取起始地區費用
    function getStartRegionFee(serviceType) {
      const selectId = serviceType === 'moving' ? 'movingStartRegion' : 'petStartRegion';
      const select = document.getElementById(selectId);
      const selectedOption = select.options[select.selectedIndex];
      return parseInt(selectedOption.getAttribute('data-fee')) || 0;
    }

    // 更新搬家樓層選項
    function updateMovingFloorOptions() {
      const floorType = document.getElementById('movingFloorType').value;
      const floorCountGroup = document.getElementById('movingFloorCountGroup');
      const floorCountInput = document.getElementById('movingFloorCount');
      
      if (floorType === '樓梯') {
        floorCountGroup.style.display = 'block';
        floorCountInput.required = true;
      } else if (floorType === '電梯') {
        floorCountGroup.style.display = 'none';
        floorCountInput.required = false;
        floorCountInput.value = '';
      } else {
        floorCountGroup.style.display = 'none';
        floorCountInput.required = false;
        floorCountInput.value = '';
      }
      
      updateMovingSummary();
    }

    // 檢查是否為夜間時段
    function isNightTime(timeSlot) {
      if (!timeSlot) return false;
      const hour = parseInt(timeSlot.split(':')[0]);
      return hour >= 22 || hour < 6;
    }

    // 更新搬家費用總計
    function updateMovingSummary() {
      const floorType = document.getElementById('movingFloorType').value;
      const floorCount = parseInt(document.getElementById('movingFloorCount').value) || 0;
      const distance = parseFloat(document.getElementById('movingDistance').value) || 0;
      const startRegionFee = getStartRegionFee('moving');
      
      let html = '';
      let total = PRICING.moving.baseFee;
      
      // 基本出車費
      html += `
        <div class="summary-item">
          <span>基本出車費（含5公里內）</span>
          <span>NT$ ${PRICING.moving.baseFee.toLocaleString()}</span>
        </div>
      `;
      
      // 起始地區費用
      if (startRegionFee > 0) {
        total += startRegionFee;
        const select = document.getElementById('movingStartRegion');
        const regionName = select.options[select.selectedIndex].value;
        html += `
          <div class="summary-item">
            <span>起始地區費用（${regionName}）</span>
            <span>NT$ ${startRegionFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 超程費用
      if (distance > PRICING.moving.baseDistance) {
        const extraDistance = distance - PRICING.moving.baseDistance;
        const extraFee = Math.ceil(extraDistance) * PRICING.moving.extraDistanceFee;
        total += extraFee;
        html += `
          <div class="summary-item">
            <span>超程累加費 (${Math.ceil(extraDistance)}公里)</span>
            <span>NT$ ${extraFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 樓層費用
      if (floorType === '電梯') {
        total += PRICING.moving.elevatorFee;
        html += `
          <div class="summary-item">
            <span>電梯樓層費</span>
            <span>NT$ ${PRICING.moving.elevatorFee.toLocaleString()}</span>
          </div>
        `;
      } else if (floorType === '樓梯' && floorCount > 0) {
        const stairsFee = PRICING.moving.stairsFeePerFloor * floorCount;
        total += stairsFee;
        html += `
          <div class="summary-item">
            <span>走樓梯樓層費 (${floorCount}層)</span>
            <span>NT$ ${stairsFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 額外服務
      for (const [name, data] of Object.entries(movingServicesData)) {
        const itemTotal = data.price * data.quantity;
        total += itemTotal;
        html += `
          <div class="summary-item">
            <span>${name} ${data.quantity > 1 ? 'x' + data.quantity : ''}</span>
            <span>NT$ ${itemTotal.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 夜間加給
      if (isNightTime(selectedMovingTimeSlot)) {
        total += PRICING.moving.nightSurcharge;
        html += `
          <div class="summary-item">
            <span>夜間出勤加給 (22:00-06:00)</span>
            <span>NT$ ${PRICING.moving.nightSurcharge.toLocaleString()}</span>
          </div>
        `;
      }
      
      html += `
        <div class="summary-item">
          <span>總金額</span>
          <span>NT$ ${total.toLocaleString()}</span>
        </div>
      `;
      
      document.getElementById('movingSummary').innerHTML = html;
    }

    // 更新寵物接送費用總計
    function updatePetSummary() {
      const distance = parseFloat(document.getElementById('petDistance').value) || 0;
      const ownerAccompany = document.getElementById('petOwnerAccompany').value === 'yes';
      const startRegionFee = getStartRegionFee('pet');
      
      let html = '';
      let total = PRICING.pet.baseFee;
      
      // 基礎出車費
      html += `
        <div class="summary-item">
          <span>基礎出車費 (含5公里內)</span>
          <span>NT$ ${PRICING.pet.baseFee.toLocaleString()}</span>
        </div>
      `;
      
      // 起始地區費用
      if (startRegionFee > 0) {
        total += startRegionFee;
        const select = document.getElementById('petStartRegion');
        const regionName = select.options[select.selectedIndex].value;
        html += `
          <div class="summary-item">
            <span>起始地區費用（${regionName}）</span>
            <span>NT$ ${startRegionFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 超程費用
      if (distance > PRICING.pet.baseDistance) {
        const extraDistance = distance - PRICING.pet.baseDistance;
        const extraFee = Math.ceil(extraDistance) * PRICING.pet.extraDistanceFee;
        total += extraFee;
        html += `
          <div class="summary-item">
            <span>超程累加費 (${Math.ceil(extraDistance)}公里)</span>
            <span>NT$ ${extraFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 飼主陪同
      if (ownerAccompany) {
        total += PRICING.pet.ownerAccompanyFee;
        html += `
          <div class="summary-item">
            <span>飼主陪同費用</span>
            <span>NT$ ${PRICING.pet.ownerAccompanyFee.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 額外服務
      for (const [name, data] of Object.entries(petServicesData)) {
        const itemTotal = data.price * data.quantity;
        total += itemTotal;
        html += `
          <div class="summary-item">
            <span>${name} ${data.quantity > 1 ? 'x' + data.quantity : ''}</span>
            <span>NT$ ${itemTotal.toLocaleString()}</span>
          </div>
        `;
      }
      
      // 夜間加給
      if (isNightTime(selectedPetTimeSlot)) {
        total += PRICING.pet.nightSurcharge;
        html += `
          <div class="summary-item">
            <span>夜間出勤加給 (22:00-06:00)</span>
            <span>NT$ ${PRICING.pet.nightSurcharge.toLocaleString()}</span>
          </div>
        `;
      }
      
      html += `
        <div class="summary-item">
          <span>總金額</span>
          <span>NT$ ${total.toLocaleString()}</span>
        </div>
      `;
      
      document.getElementById('petSummary').innerHTML = html;
    }

    // 切換服務項目
    function toggleService(element, serviceType, serviceName, price, canChangeQuantity) {
      const checkbox = element.querySelector('input[type="checkbox"]');
      const quantityControl = element.querySelector('.quantity-control');
      
      if (checkbox.disabled) return;
      
      checkbox.checked = !checkbox.checked;
      
      if (checkbox.checked) {
        element.classList.add('checked');
        if (quantityControl) {
          quantityControl.style.display = 'flex';
        }
        
        if (serviceType === 'moving') {
          movingServicesData[serviceName] = { price: price, quantity: 1, canChangeQuantity: canChangeQuantity };
          updateMovingSummary();
        } else {
          petServicesData[serviceName] = { price: price, quantity: 1, canChangeQuantity: canChangeQuantity };
          updatePetSummary();
        }
      } else {
        element.classList.remove('checked');
        if (quantityControl) {
          quantityControl.style.display = 'none';
          quantityControl.querySelector('.quantity-display').textContent = '1';
        }
        
        if (serviceType === 'moving') {
          delete movingServicesData[serviceName];
          updateMovingSummary();
        } else {
          delete petServicesData[serviceName];
          updatePetSummary();
        }
      }
    }

    // 修改數量
    function changeQuantity(button, change, serviceType) {
      const quantityControl = button.parentElement;
      const quantityDisplay = quantityControl.querySelector('.quantity-display');
      const checkboxItem = quantityControl.closest('.checkbox-item');
      const serviceName = checkboxItem.querySelector('span').textContent;
      
      let currentQuantity = parseInt(quantityDisplay.textContent);
      let newQuantity = Math.max(1, currentQuantity + change);
      
      quantityDisplay.textContent = newQuantity;
      
      if (serviceType === 'moving' && movingServicesData[serviceName]) {
        movingServicesData[serviceName].quantity = newQuantity;
        updateMovingSummary();
      } else if (serviceType === 'pet' && petServicesData[serviceName]) {
        petServicesData[serviceName].quantity = newQuantity;
        updatePetSummary();
      }
    }

    // 載入可預約時段
    async function loadAvailableTimeSlots(serviceType) {
      const dateInput = document.getElementById(serviceType + 'Date');
      const date = dateInput.value;
      
      if (!date) return;
      
      const section = document.getElementById(serviceType + 'TimeSlotsSection');
      const grid = document.getElementById(serviceType + 'TimeSlotsGrid');
      
      section.style.display = 'block';
      grid.innerHTML = '<p style="color: #A0826D; padding: 20px; text-align: center;">載入中...</p>';
      
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getAvailableTimeSlots&date=${date}`);
        const result = await response.json();
        
        console.log('時段 API 回應:', result);
        
        grid.innerHTML = '';
        
        if (result.success && result.timeSlots && result.timeSlots.length > 0) {
          result.timeSlots.forEach(slot => {
            const slotDiv = document.createElement('div');
            slotDiv.className = `time-slot ${slot.available ? '' : 'disabled'}`;
            slotDiv.textContent = slot.time;
            
            if (slot.available) {
              slotDiv.onclick = function() {
                document.querySelectorAll(`#${serviceType}TimeSlotsGrid .time-slot`).forEach(s => {
                  s.classList.remove('selected');
                });
                this.classList.add('selected');
                
                if (serviceType === 'moving') {
                  selectedMovingTimeSlot = slot.time;
                  updateMovingSummary();
                } else {
                  selectedPetTimeSlot = slot.time;
                  updatePetSummary();
                }
              };
            }
            
            grid.appendChild(slotDiv);
          });
        } else {
          grid.innerHTML = '<p style="color: #D2691E; padding: 20px; text-align: center;">此日期尚無可預約時段，請選擇其他日期或聯繫客服<br>LINE ID: 0922317535</p>';
        }
      } catch (error) {
        console.error('載入時段失敗:', error);
        grid.innerHTML = '<p style="color: #D2691E; padding: 20px; text-align: center;">載入時段失敗，請稍後再試或聯繫客服<br>LINE ID: 0922317535</p>';
      }
    }

    // 計算搬家總金額
    function calculateMovingTotal() {
      const floorType = document.getElementById('movingFloorType').value;
      const floorCount = parseInt(document.getElementById('movingFloorCount').value) || 0;
      const distance = parseFloat(document.getElementById('movingDistance').value) || 0;
      const startRegionFee = getStartRegionFee('moving');
      
      let total = PRICING.moving.baseFee + startRegionFee;
      
      if (distance > PRICING.moving.baseDistance) {
        const extraDistance = distance - PRICING.moving.baseDistance;
        total += Math.ceil(extraDistance) * PRICING.moving.extraDistanceFee;
      }
      
      if (floorType === '電梯') {
        total += PRICING.moving.elevatorFee;
      } else if (floorType === '樓梯' && floorCount > 0) {
        total += PRICING.moving.stairsFeePerFloor * floorCount;
      }
      
      for (const data of Object.values(movingServicesData)) {
        total += data.price * data.quantity;
      }
      
      if (isNightTime(selectedMovingTimeSlot)) {
        total += PRICING.moving.nightSurcharge;
      }
      
      return total;
    }

    // 計算寵物接送總金額
    function calculatePetTotal() {
      const distance = parseFloat(document.getElementById('petDistance').value) || 0;
      const ownerAccompany = document.getElementById('petOwnerAccompany').value === 'yes';
      const startRegionFee = getStartRegionFee('pet');
      
      let total = PRICING.pet.baseFee + startRegionFee;
      
      if (distance > PRICING.pet.baseDistance) {
        const extraDistance = distance - PRICING.pet.baseDistance;
        total += Math.ceil(extraDistance) * PRICING.pet.extraDistanceFee;
      }
      
      if (ownerAccompany) {
        total += PRICING.pet.ownerAccompanyFee;
      }
      
      for (const data of Object.values(petServicesData)) {
        total += data.price * data.quantity;
      }
      
      if (isNightTime(selectedPetTimeSlot)) {
        total += PRICING.pet.nightSurcharge;
      }
      
      return total;
    }

    // 表單提交
    document.getElementById('movingForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!selectedMovingTimeSlot) {
        alert('請選擇預約時段');
        return;
      }
      
      const startRegion = document.getElementById('movingStartRegion').value;
      if (!startRegion) {
        alert('請選擇起始地區');
        return;
      }
      
      const floorType = document.getElementById('movingFloorType').value;
      if (!floorType) {
        alert('請選擇樓層類型');
        return;
      }
      
      const distance = document.getElementById('movingDistance').value;
      if (!distance || distance <= 0) {
        alert('請輸入預估距離');
        return;
      }
      
      const formData = new FormData(this);
      const data = {
        serviceType: '搬家服務',
        name: formData.get('name'),
        phone: formData.get('phone'),
        bookingDate: formData.get('bookingDate'),
        bookingTime: selectedMovingTimeSlot,
        startRegion: startRegion,
        startAddress: formData.get('startAddress'),
        endAddress: formData.get('endAddress'),
        distance: distance,
        floorType: floorType,
        floorCount: formData.get('floorCount') || '',
        requirements: formData.get('requirements'),
        isNight: isNightTime(selectedMovingTimeSlot),
        serviceItems: JSON.stringify(Object.entries(movingServicesData).map(([name, data]) => ({
          name: name,
          price: data.price,
          quantity: data.quantity
        }))),
        totalAmount: calculateMovingTotal()
      };
      
      await submitOrder(data);
    });

    document.getElementById('petForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!selectedPetTimeSlot) {
        alert('請選擇預約時段');
        return;
      }
      
      const startRegion = document.getElementById('petStartRegion').value;
      if (!startRegion) {
        alert('請選擇起始地區');
        return;
      }
      
      const distance = document.getElementById('petDistance').value;
      if (!distance || distance <= 0) {
        alert('請輸入預估距離');
        return;
      }
      
      const formData = new FormData(this);
      const data = {
        serviceType: '寵物接送',
        name: formData.get('name'),
        phone: formData.get('phone'),
        bookingDate: formData.get('bookingDate'),
        bookingTime: selectedPetTimeSlot,
        startRegion: startRegion,
        startAddress: formData.get('startAddress'),
        endAddress: formData.get('endAddress'),
        distance: distance,
        ownerAccompany: formData.get('ownerAccompany') === 'yes',
        requirements: formData.get('requirements'),
        isNight: isNightTime(selectedPetTimeSlot),
        serviceItems: JSON.stringify(Object.entries(petServicesData).map(([name, data]) => ({
          name: name,
          price: data.price,
          quantity: data.quantity
        }))),
        totalAmount: calculatePetTotal()
      };
      
      await submitOrder(data);
    });

    // ✨ 修改：提交訂單（加入載入畫面）
    async function submitOrder(data) {
      // 顯示載入畫面
      showSubmitLoading();
      
      const formData = new URLSearchParams();
      for (const key in data) {
        formData.append(key, data[key]);
      }
      
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });
        
        const result = await response.json();
        
        // 隱藏載入畫面
        hideSubmitLoading();
        
        if (result.success) {
          document.getElementById('successMessage').innerHTML = `
            <strong>訂單編號：${result.orderNumber}</strong><br>
            我們已收到您的預約，將盡快與您聯繫確認！<br><br>
            如有任何問題，歡迎聯繫我們：<br>
            LINE ID: 0922317535
          `;
          document.getElementById('successModal').classList.add('show');
          
          // 重置表單
          if (data.serviceType === '搬家服務') {
            document.getElementById('movingForm').reset();
            movingServicesData = {};
            selectedMovingTimeSlot = null;
            document.getElementById('movingFloorCountGroup').style.display = 'none';
            updateMovingSummary();
          } else {
            document.getElementById('petForm').reset();
            petServicesData = {};
            selectedPetTimeSlot = null;
            updatePetSummary();
          }
          
          // 重置所有勾選項目
          document.querySelectorAll('.checkbox-item').forEach(item => {
            item.classList.remove('checked');
            const checkbox = item.querySelector('input[type="checkbox"]');
            if (!checkbox.disabled) {
              checkbox.checked = false;
            }
            const quantityControl = item.querySelector('.quantity-control');
            if (quantityControl) {
              quantityControl.style.display = 'none';
              quantityControl.querySelector('.quantity-display').textContent = '1';
            }
          });
        } else {
          alert('預約失敗：' + result.error);
        }
      } catch (error) {
        console.error('提交失敗:', error);
        // 隱藏載入畫面
        hideSubmitLoading();
        alert('提交失敗，請稍後再試或直接聯繫我們\nLINE ID: 0922317535');
      }
    }

    // 關閉彈窗
    function closeModal() {
      document.getElementById('successModal').classList.remove('show');
    }

    // 初始化
    window.onload = function() {
      updateMovingSummary();
      updatePetSummary();
      
      // 設定日期選擇器的最小日期為今天
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('movingDate').setAttribute('min', today);
      document.getElementById('petDate').setAttribute('min', today);
    };
  </script>
