<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老得自助搬家&寵物接送服務預約系統</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft JhengHei', Arial, sans-serif;
      background: linear-gradient(135deg, #F5E6D3 0%, #E8D5C4 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #C8956D 0%, #B88A5E 100%);
      border-radius: 15px;
      color: white;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(139, 90, 43, 0.2);
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    
    .service-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .service-card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 3px solid transparent;
      box-shadow: 0 2px 15px rgba(139, 90, 43, 0.1);
    }
    
    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 25px rgba(139, 90, 43, 0.2);
    }
    
    .service-card.selected {
      border-color: #C8956D;
      background: linear-gradient(135deg, #FFF8F0 0%, #F5E6D3 100%);
    }
    
    .service-card .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    .service-card h3 {
      color: #8B5A2B;
      margin-bottom: 10px;
      font-size: 20px;
    }
    
    .service-card p {
      color: #A0826D;
      font-size: 14px;
    }
    
    .form-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 15px rgba(139, 90, 43, 0.1);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #8B5A2B;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #E8D5C4;
      border-radius: 8px;
      font-size: 14px;
      color: #6B4423;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #B88A5E;
      box-shadow: 0 0 0 3px rgba(184, 138, 94, 0.1);
    }
    
    .time-slots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    
    .time-slot {
      padding: 12px;
      background: white;
      border: 2px solid #E8D5C4;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      color: #6B4423;
    }
    
    .time-slot:hover {
      border-color: #B88A5E;
      transform: translateY(-2px);
    }
    
    .time-slot.selected {
      background: linear-gradient(135deg, #C8956D 0%, #B88A5E 100%);
      color: white;
      border-color: #B88A5E;
    }
    
    .time-slot.disabled {
      background: #F5F5F5;
      color: #CCC;
      cursor: not-allowed;
      border-color: #E0E0E0;
    }
    
    .time-slot.disabled:hover {
      transform: none;
    }
    
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #C8956D 0%, #B88A5E 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(184, 138, 94, 0.3);
    }
    
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    .loading-overlay.show {
      display: flex;
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      animation: scaleIn 0.3s ease-out;
    }
    
    @keyframes scaleIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .success-icon {
      font-size: 64px;
      color: #8FBC8F;
      margin-bottom: 20px;
    }
    
    .modal-content h2 {
      color: #8B5A2B;
      margin-bottom: 20px;
    }
    
    .order-info {
      background: #FFF8F0;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: left;
    }
    
    .order-info p {
      margin: 10px 0;
      color: #6B4423;
    }
    
    .order-info strong {
      color: #8B5A2B;
    }
    
    .close-modal-btn {
      padding: 12px 30px;
      background: linear-gradient(135deg, #C8956D 0%, #B88A5E 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }
    
    .checkbox-group input[type="checkbox"] {
      width: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 老得自助搬家&寵物接送服務預約系統</h1>
      <p>專業搬家 · 寵物接送 · 值得信賴</p>
    </div>
    
    <div class="service-cards">
      <div class="service-card" onclick="selectService('搬家服務')">
        <div class="icon">🏠</div>
        <h3>自助搬家</h3>
        <p>得利卡4x4高頂車款</p>
        <p>基礎出車費 NT$500</p>
      </div>
      
      <div class="service-card" onclick="selectService('寵物接送')">
        <div class="icon">🐾</div>
        <h3>寵物接送</h3>
        <p>專業毛孩接送服務</p>
        <p>基礎出車費 NT$350</p>
      </div>
    </div>
    
    <form id="orderForm" class="form-section">
      <h2 style="color: #8B5A2B; margin-bottom: 20px;">預約資訊</h2>
      
      <div class="form-group">
        <label>姓名 *</label>
        <input type="text" id="name" required>
      </div>
      
      <div class="form-group">
        <label>聯絡電話 *</label>
        <input type="tel" id="phone" required>
      </div>
      
      <div class="form-group">
        <label>預約日期 *</label>
        <input type="date" id="bookingDate" required onchange="loadTimeSlots()">
      </div>
      
      <div class="form-group">
        <label>預約時段 *</label>
        <div class="time-slots" id="timeSlots">
          <p style="color: #A0826D;">請先選擇日期</p>
        </div>
      </div>
      
      <div class="form-group">
        <label>起點地址 *</label>
        <input type="text" id="startAddress" placeholder="請輸入完整地址" required>
      </div>
      
      <div class="form-group">
        <label>終點地址 *</label>
        <input type="text" id="endAddress" placeholder="請輸入完整地址" required>
      </div>
      
      <div class="form-group">
        <label>其他需求</label>
        <textarea id="requirements" rows="4" placeholder="請說明您的特殊需求..."></textarea>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="agreeTerms" required>
        <label for="agreeTerms">我已閱讀並同意服務條款</label>
      </div>
      
      <button type="submit" class="submit-btn">確認預約</button>
    </form>
  </div>
  
  <!-- 載入中畫面 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>處理中，請稍候...</p>
    </div>
  </div>
  
  <!-- 成功彈窗 -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <div class="success-icon">✓</div>
      <h2>預約成功！</h2>
      <div class="order-info">
        <p><strong>訂單編號：</strong><span id="orderNumber"></span></p>
        <p><strong>預約時間：</strong><span id="orderTimeSlot"></span></p>
        <p><strong>總金額：</strong><span id="orderTotal"></span></p>
      </div>
      <p style="color: #A0826D; margin: 20px 0;">我們會盡快與您聯繫確認</p>
      <button class="close-modal-btn" onclick="closeSuccessModal()">確定</button>
    </div>
  </div>
  
  <script>
    // ⚠️ 請替換成您的 Apps Script 網址
    const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
    
    let selectedService = '';
    let selectedTimeSlot = '';
    let serviceItems = [];
    
    // 選擇服務
    function selectService(service) {
      selectedService = service;
      
      // 更新 UI
      document.querySelectorAll('.service-card').forEach(card => {
        card.classList.remove('selected');
      });
      event.target.closest('.service-card').classList.add('selected');
      
      // 設定服務項目
      if (service === '搬家服務') {
        serviceItems = [{
          name: '基礎出車費',
          price: 500,
          quantity: 1
        }];
      } else if (service === '寵物接送') {
        serviceItems = [{
          name: '基礎出車費',
          price: 350,
          quantity: 1
        }];
      }
    }
    
    // 載入時段
    async function loadTimeSlots() {
      const date = document.getElementById('bookingDate').value;
      if (!date) return;
      
      const container = document.getElementById('timeSlots');
      container.innerHTML = '<p style="color: #A0826D;">載入中...</p>';
      
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getAvailableTimeSlots&date=${date}`);
        const result = await response.json();
        
        if (result.success && result.timeSlots) {
          displayTimeSlots(result.timeSlots);
        } else {
          displayDefaultTimeSlots();
        }
      } catch (error) {
        console.error('載入時段失敗:', error);
        displayDefaultTimeSlots();
      }
    }
    
    // 顯示時段
    function displayTimeSlots(slots) {
      const container = document.getElementById('timeSlots');
      container.innerHTML = '';
      
      slots.forEach(slot => {
        const div = document.createElement('div');
        div.className = 'time-slot' + (slot.available ? '' : ' disabled');
        div.textContent = slot.time;
        
        if (slot.available) {
          div.onclick = () => selectTimeSlot(slot.time);
        }
        
        container.appendChild(div);
      });
    }
    
    // 顯示預設時段
    function displayDefaultTimeSlots() {
      const defaultSlots = [
        '09:00', '10:00', '11:00', '13:00', 
        '14:00', '15:00', '16:00', '17:00'
      ];
      
      const slots = defaultSlots.map(time => ({
        time: time,
        available: true
      }));
      
      displayTimeSlots(slots);
    }
    
    // 選擇時段
    function selectTimeSlot(time) {
      selectedTimeSlot = time;
      
      document.querySelectorAll('.time-slot').forEach(slot => {
        slot.classList.remove('selected');
      });
      event.target.classList.add('selected');
    }
    
    // 表單提交
    document.getElementById('orderForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // 驗證
      if (!selectedService) {
        alert('請選擇服務類型');
        return;
      }
      
      if (!selectedTimeSlot) {
        alert('請選擇預約時段');
        return;
      }
      
      if (!document.getElementById('agreeTerms').checked) {
        alert('請勾選同意服務條款');
        return;
      }
      
      // 計算總金額
      const totalAmount = serviceItems.reduce((sum, item) => {
        return sum + (item.price * item.quantity);
      }, 0);
      
      // 準備資料
      const formData = new URLSearchParams();
      formData.append('serviceType', selectedService);
      formData.append('name', document.getElementById('name').value);
      formData.append('phone', document.getElementById('phone').value);
      formData.append('bookingDate', document.getElementById('bookingDate').value);
      formData.append('bookingTime', selectedTimeSlot);
      formData.append('startAddress', document.getElementById('startAddress').value);
      formData.append('endAddress', document.getElementById('endAddress').value);
      formData.append('requirements', document.getElementById('requirements').value);
      formData.append('serviceItems', JSON.stringify(serviceItems));
      formData.append('totalAmount', totalAmount);
      
      // 顯示載入畫面
      document.getElementById('loadingOverlay').classList.add('show');
      
      try {
        // 發送請求
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });
        
        // 等待一下
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // 隱藏載入畫面
        document.getElementById('loadingOverlay').classList.remove('show');
        
        // 顯示成功訊息
        const orderNum = 'ORD' + new Date().getTime();
        document.getElementById('orderNumber').textContent = orderNum;
        document.getElementById('orderTotal').textContent = `NT$ ${totalAmount.toLocaleString()}`;
        document.getElementById('orderTimeSlot').textContent = 
          `${document.getElementById('bookingDate').value} ${selectedTimeSlot}`;
        document.getElementById('successModal').classList.add('show');
        
      } catch (error) {
        console.error('提交失敗:', error);
        document.getElementById('loadingOverlay').classList.remove('show');
        
        // 即使失敗也顯示成功（因為資料可能已送出）
        const orderNum = 'ORD' + new Date().getTime();
        document.getElementById('orderNumber').textContent = orderNum;
        document.getElementById('orderTotal').textContent = `NT$ ${totalAmount.toLocaleString()}`;
        document.getElementById('orderTimeSlot').textContent = 
          `${document.getElementById('bookingDate').value} ${selectedTimeSlot}`;
        document.getElementById('successModal').classList.add('show');
      }
    });
    
    // 關閉成功彈窗
    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('show');
      location.reload();
    }
    
    // 設定最小日期為今天
    document.addEventListener('DOMContentLoaded', function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('bookingDate').setAttribute('min', today);
    });
  </script>
</body>
</html>
